# MTG Configuration
# MTPROTO Proxy for Telegram

# Required: Secret key for authentication (generate using: openssl rand -hex 16)
secret: "your-secret-here"

# Required: Address to bind to
bind-to: ":443"

# Domain to use for domain fronting (fallback website)
domain: "www.cloudflare.com"

# TLS configuration (optional but recommended)
tls:
  cert-file: "cert.pem"
  key-file: "key.pem"

# Blocklist URL (optional) - FireHOL format
# blocklist: "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset"

# SOCKS5 proxy for chaining (optional)
# socks5: "127.0.0.1:1080"
